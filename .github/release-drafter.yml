name-template: "v$NEXT_PATCH_VERSION"
tag-template: "v$NEXT_PATCH_VERSION"
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
template: |
  ## Changes

  $CHANGES

  ## Docker Images

  Replace `<repo-owner>` with the GitHub user or org that owns the repository.

  - `ghcr.io/<repo-owner>/nextjs-python-computer-vision-kit-backend:$RESOLVED_VERSION`
  - `ghcr.io/<repo-owner>/nextjs-python-computer-vision-kit-frontend:$RESOLVED_VERSION`

categories:
  - title: "Frontend"
    labels:
      - frontend
      - ui
  - title: "Backend"
    labels:
      - backend
      - api
  - title: "CI/CD"
    labels:
      - ci
      - release
      - infra
  - title: "Docs"
    labels:
      - docs
  - title: "Maintenance"
    labels:
      - chore

change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - major
  minor:
    labels:
      - minor
  patch:
    labels:
      - patch
  default: patch

autolabeler:
  - label: frontend
    files:
      - "frontend/**"
  - label: ui
    files:
      - "frontend/src/**"
      - "docs/assets/**"
  - label: backend
    files:
      - "backend/**"
  - label: api
    files:
      - "docs/openapi.yaml"
      - "backend/app/**"
      - "backend/tests/test_inference_route.py"
      - "frontend/src/generated/openapi.ts"
      - "frontend/src/lib/api.ts"
  - label: ci
    files:
      - ".github/workflows/**"
  - label: release
    files:
      - ".github/release-drafter.yml"
      - ".github/workflows/release-drafter.yml"
      - ".github/workflows/release.yml"
      - ".github/workflows/sync-labels.yml"
      - ".github/labels.json"
  - label: infra
    files:
      - "scripts/**"
      - "backend/Dockerfile"
      - "backend/.dockerignore"
      - "frontend/Dockerfile"
      - "frontend/.dockerignore"
      - "docker-compose.yml"
  - label: docs
    files:
      - "README.md"
      - "CONTRIBUTING.md"
      - "AGENTS.md"
      - "SECURITY.md"
      - "soon.md"
      - "docs/**"
