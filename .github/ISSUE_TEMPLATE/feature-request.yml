name: Feature Request
description: Propose a new capability or improvement for the template.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this solve for users of the repo?
      placeholder: The starter currently lacks ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the improvement you want to see.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend
        - Backend
        - API contract
        - CI/CD
        - Docs
        - Docker / deployment
        - Developer workflow
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Extra Context
      description: Links, mockups, tradeoffs, or implementation notes.
    validations:
      required: false
