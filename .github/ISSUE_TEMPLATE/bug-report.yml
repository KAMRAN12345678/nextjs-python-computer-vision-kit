name: Bug Report
description: Report a bug in the starter kit or its developer workflow.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is going wrong?
      placeholder: A short description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: How can someone reproduce the issue?
      placeholder: |
        1. Go to ...
        2. Run ...
        3. Upload ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Node version, Python version, and anything else relevant.
      placeholder: Windows 11, Node 22, Python 3.12, Docker Desktop off, etc.
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs or Screenshots
      description: Paste any helpful logs, stack traces, or screenshots.
    validations:
      required: false
